<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холбоо барих - MTRL МУИС</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="container navbar">
            <a href="index.html" class="logo">
                <img src="https://set.num.edu.mn/wp-content/themes/num-set/assets/images/logo.png" alt="NUM SET Logo">
                <div class="logo-text">
                    <h1>Материал судлал, инженерчлэл</h1>
                    <p>Materials Science and Engineering</p>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Нүүр</a></li>
                <li><a href="contact.html">Холбоо барих</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header" style="background: var(--dark-blue); color: white; padding: 40px 0;">
            <div class="container">
                <h1>Холбоо барих</h1>
            </div>
        </section>

        <section id="contact-info">
            <div class="container">
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div>
                        <h3>Бидэнтэй холбогдох</h3>
                        <div style="margin-top: 30px;">
                            <p style="margin-bottom: 20px;"><i data-lucide="map-pin" style="vertical-align: middle; margin-right: 10px; color: var(--primary-blue);"></i> <strong>Хаяг:</strong> МУИС-ийн хичээлийн 2-р байр, 401 тоот, Улаанбаатар, Монгол Улс</p>
                            <p style="margin-bottom: 20px;"><i data-lucide="phone" style="vertical-align: middle; margin-right: 10px; color: var(--primary-blue);"></i> <strong>Утас:</strong> +976 7730 7730 (3206)</p>
                            <p style="margin-bottom: 20px;"><i data-lucide="mail" style="vertical-align: middle; margin-right: 10px; color: var(--primary-blue);"></i> <strong>И-мэйл:</strong> info@seas.num.edu.mn</p>
                        </div>
                    </div>
                    <div>
                        <div class="card p-20">
                            <h3 style="margin-bottom: 20px;">Зурвас илгээх</h3>
                            <form id="contact-form">
                                <input type="text" class="chat-input" style="width: 100%; margin-bottom: 15px;" placeholder="Таны нэр">
                                <input type="email" class="chat-input" style="width: 100%; margin-bottom: 15px;" placeholder="И-мэйл хаяг">
                                <textarea class="chat-input" style="width: 100%; height: 100px; margin-bottom: 15px;" placeholder="Зурвас"></textarea>
                                <button type="button" class="btn btn-primary" onclick="alert('Зурвас илгээгдлээ. Баярлалаа!')">Илгээх</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script> lucide.createIcons(); </script>
</body>
</html>
